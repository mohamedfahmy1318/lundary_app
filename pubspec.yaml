name: laundry
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # State Management
  flutter_bloc: ^9.1.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # DI
  get_it: ^8.0.3

  # Navigation
  go_router: ^15.1.2

  # Storage
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.7

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.19.0
  pretty_dio_logger: ^1.4.0
  image_picker: ^1.2.1
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  geolocator: ^12.0.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.2
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/new_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/new_logo.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/new_logo.png
  android: true
  ios: true
  web: false
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#FFFFFF"
    image: assets/images/new_logo.png

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
