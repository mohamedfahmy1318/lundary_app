name: laundry
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # State Management
  flutter_bloc: ^9.1.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.8.0
  connectivity_plus: ^6.1.4

  # DI
  get_it: ^8.0.3

  # Navigation
  go_router: ^15.1.2

  # Storage
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.7

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.19.0
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.2
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
